<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="vendors/jquery-3.5.1.min.js"></script>
    <script src="scripts/client.js"></script>
    <link rel="stylesheet" href="/styles/styles.css"/>
    <title>sql To Do List</title>
</head>

<body>
    <h1>* To Do List *</h1>

    <h2>Add New Items to Your List</h2>
    <!-- create task here -->
    <div id="add">
        <label for="name">Name:</label>
        <input type="text" id="name"/>

        <label for="task">Task:</label>
        <input type="text" id="task"/>

        <label for="date">Date:</label>
        <input type="date" id="date"/>

        <button id="addTask">Add Task</button>
    </div>
    <br></br>

    <h2>To Do Items</h2>
    <table id="tableWrapper" class="center">
        <thead>
            <tr colspan = '5'>
                <th>Name</th>
                <th>Task</th>
                <th>Date</th>
                <th>Completed</th>
                <!-- connect upate logic to the completed colum -->
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="todoTableBody">
        <!-- append task list here -->
        </tbody>
    </table>

</body>
</html>
